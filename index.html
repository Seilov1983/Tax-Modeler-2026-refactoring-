<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxStructure AI — Enterprise Modeler</title>
  <link rel="stylesheet" href="./src/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
  
  <div id="app" class="app-container">
    <header class="glass-header">
      <div class="brand">
        <div class="brand-icon">✨</div>
        <span class="brand-name">TaxStructure AI</span>
      </div>
      <div class="header-controls">
        <button class="theme-toggle" id="themeToggle">
          <span class="icon" id="themeIcon">🌓</span>
        </button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="sidebar glass">
        <div class="card">
          <div class="title" id="projTitle">Demo Project</div>
          <div class="small" id="metaLine"></div>
          <div class="sep"></div>
          <div class="tabs" id="tabs"></div>
        </div>

        <div class="card" id="panel"></div>

        <div class="card">
          <div class="title">Проект</div>
          <div class="row">
            <button class="btn" id="btnNew">Demo Project</button>
            <button class="btn secondary" id="btnNewEmpty">Empty</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button class="btn secondary" id="btnExport">Export JSON</button>
            <button class="btn secondary" id="btnImport">Import</button>
            <button class="btn danger" id="btnClear">Reset</button>
          </div>
        </div>
      </aside>

      <section class="main canvas-grid">
        <div class="canvasWrap">
          <div class="canvas" id="canvas" data-w="1400" data-h="1000"></div>
          <div class="toastWrap" id="toasts"></div>
          <div class="roBadge" id="roBadge" style="display:none; position:absolute; top:10px; right:10px; background:var(--danger); color:#fff; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:12px; z-index:100;">READ ONLY</div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
