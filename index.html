<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxStructure AI — Enterprise Modeler</title>
  <link rel="stylesheet" href="./src/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="light-mode">

  <div id="toasts" class="toastWrap"></div>

  <div style="display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; background: var(--bg-color);">
      
      <header class="top-bar">
          <div class="brand">
              <span style="font-size: 18px; font-weight: 800;">TSM 26</span>
              <div id="metaLine" style="font-size: 11px; color: var(--muted); margin-top: 2px;">schema 2.4.1</div>
          </div>

          <nav class="top-tabs">
              <button class="top-tab" data-target="screen-master">Мастер-данные</button>
              <button class="top-tab active" data-target="screen-modeling">Моделирование</button>
              <button class="top-tab" data-target="screen-analytics">Аналитика</button>
          </nav>

          <div class="top-actions">
              <div class="system-state">
                  <span class="state-dot ok"></span>
                  <span id="stateText">Ready</span>
              </div>
              <button id="btnSettings" class="gear-btn" title="Настройки системы">⚙️</button>
          </div>
      </header>

      <div id="main-content" style="flex: 1; position: relative;">

          <div id="screen-master" class="app-screen" style="display: none; width: 100%; height: 100%; padding: 30px; overflow-y: auto;">
              <div style="max-width: 1200px; margin: 0 auto;">
                  
                  <h2 style="margin-top: 0; margin-bottom: 16px;">Базовые вводные (Environment)</h2>
                  <div id="fxDataContainer" class="hierarchical-list" style="margin-bottom: 40px;">
                      </div>

                  <h2 style="margin-top: 0; display: flex; align-items: center; justify-content: space-between;">
                      Глобальные Справочники 
                      <div style="display: flex; gap: 10px;">
                          <button id="btnImportCountries" class="btn" style="background: var(--ok); color: white;">📥 Загрузить Страны</button>
                          <button id="btnImportRegimes" class="btn secondary" disabled title="Сначала загрузите страны">📥 Загрузить Режимы</button>
                      </div>
                  </h2>
                  <div id="masterDataContainer" class="hierarchical-list" style="margin-top: 20px;">
                      <div style="text-align:center; padding: 40px; color: var(--muted); border: 2px dashed var(--stroke); border-radius: 12px;">
                          Нет данных. Начните с загрузки стран (CSV).
                      </div>
                  </div>
              </div>
          </div>

          <div id="screen-modeling" class="app-screen" style="display: block; width: 100%; height: 100%; position: relative;">
              
              <div id="viewport" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; z-index: 1;">
                  <div id="canvas-board" data-w="5000" data-h="5000" style="position: absolute; width: 5000px; height: 5000px; transform-origin: 0 0;">
                      <div id="zones-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
                      <svg id="arrows-layer" xmlns="http://www.w3.org/2000/svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;"></svg>
                      <div id="nodes-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;"></div>
                  </div>
                  <button id="fabCreate" style="position: absolute; bottom: 40px; right: 40px; width: 64px; height: 64px; border-radius: 32px; background: var(--accent); color: white; border: none; font-size: 32px; font-weight: 300; box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4); cursor: pointer; z-index: 1000; transition: transform 0.2s;">+</button>
              </div>


              <div class="roBadge" id="roBadge" style="display:none; position:absolute; top:10px; right:10px; background:var(--danger); color:#fff; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:12px; z-index:100;">READ ONLY</div>

              <div id="rightDrawer" class="right-drawer">
                  <div class="right-drawer-header">
                      <h3 id="rdTitle">Добавить на канвас</h3>
                      <button id="rdClose" class="btn secondary" style="padding:4px 10px; font-size:14px; min-width:auto;">✕</button>
                  </div>
                  <div class="right-drawer-body" id="rdBody"></div>
              </div>
          </div>

          <div id="screen-analytics" class="app-screen" style="display: none; width: 100%; height: 100%; padding: 30px; overflow-y: auto;">
              <h2 style="margin-top: 0; margin-bottom: 20px; text-align: center;">Executive Dashboard</h2>
              <div id="dashboardContainer" style="max-width: 1200px; margin: 0 auto;">
                  </div>
          </div>

      </div>
  </div>

  <!-- Legacy src/js removed — app is served via Next.js (src/app/) -->
</body>
</html>
