<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaxStructure AI — Enterprise Modeler</title>
  <link rel="stylesheet" href="./src/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
  
  <div id="app" class="app-container">
    <header class="glass-header">
      <div class="brand">
        <div class="brand-icon">✨</div>
        <span class="brand-name">TaxStructure AI</span>
      </div>
      <div class="header-controls">
        <button class="theme-toggle" id="themeToggle">
          <span class="icon" id="themeIcon">🌓</span>
        </button>
      </div>
    </header>

    <main class="main-layout">
      <aside class="sidebar glass">
        <div class="card">
          <div class="title" id="projTitle">Demo Project</div>
          <div class="small" id="metaLine"></div>
          <div class="sep"></div>
          <div class="tabs" id="tabs"></div>
        </div>

        <div class="card" id="panel"></div>

        <div class="card">
          <div class="title">Проект</div>
          <div class="row">
            <button class="btn" id="btnNew">Demo Project</button>
            <button class="btn secondary" id="btnNewEmpty">Empty</button>
          </div>
          <div class="row" style="margin-top:8px">
            <button class="btn secondary" id="btnExport">Export JSON</button>
            <button class="btn secondary" id="btnImport">Import</button>
            <button class="btn danger" id="btnClear">Reset</button>
          </div>
        </div>
      </aside>

      <section class="main canvas-grid">
        <div id="viewport">
          <div id="canvas-board" data-w="5000" data-h="5000">
            <div id="zones-layer"></div>
            <svg id="arrows-layer" xmlns="http://www.w3.org/2000/svg"></svg>
            <div id="nodes-layer"></div>
          </div>
          <button id="fabCreate" style="position: absolute; bottom: 40px; right: 40px; width: 64px; height: 64px; border-radius: 32px; background: var(--accent, #a855f7); color: white; border: none; font-size: 32px; font-weight: 300; box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4); cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: transform 0.2s;">+</button>
        </div>
        <div class="toastWrap" id="toasts"></div>
        <div class="roBadge" id="roBadge" style="display:none; position:absolute; top:10px; right:10px; background:var(--danger); color:#fff; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:12px; z-index:100;">READ ONLY</div>
      </section>

      <!-- Smart Focus DnD Right Drawer -->
      <div id="rightDrawer" class="right-drawer">
        <div class="right-drawer-header">
          <h3 id="rdTitle">Добавить на канвас</h3>
          <button id="rdClose" class="btn secondary" style="padding:4px 10px; font-size:14px; min-width:auto;">✕</button>
        </div>
        <div class="right-drawer-body" id="rdBody"></div>
      </div>
    </main>
  </div>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
