<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tax Structure Modeler 2026 — Modular</title>
  <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="card">
      <div class="title" id="projTitle">Demo Project</div>
      <div class="small" id="metaLine"></div>
      <div class="sep"></div>
      <div class="tabs" id="tabs"></div>
    </div>

    <div class="card" id="panel"></div>

    <div class="card">
      <div class="title">Проект</div>
      <div class="row">
        <button class="btn primary" id="btnNew">Demo Project</button>
        <button class="btn secondary" id="btnNewEmpty" style="margin-left:8px;">Empty Project</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn secondary" id="btnExport">Export JSON</button>
        <button class="btn secondary" id="btnImport">Import JSON</button>
      </div>
      <div class="row" style="margin-top:8px">
        <button class="btn danger" id="btnClear">Reset storage</button>
      </div>
      <div class="small" style="margin-top:8px">
        Сохранение происходит автоматически в браузере. Модульная архитектура.
      </div>
    </div>
  </div>

  <div class="main">
    <div class="canvasWrap">
      <div class="canvas" id="canvas"></div>
      <div class="toastWrap" id="toasts"></div>
      <div class="roBadge" id="roBadge" style="display:none; position:absolute; top:10px; right:10px; background:var(--danger); color:#fff; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:12px; z-index:100;">READ ONLY</div>
    </div>
  </div>
</div>

<script type="module" src="./src/js/app.js"></script>
</body>
</html>
